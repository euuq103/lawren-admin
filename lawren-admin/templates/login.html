<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    :root { --bg:#020202; --border:#1e3a3f; --cyan:#2fd3e0; --text:#c8e8ec; --muted:#4a7a82; --red:#ff4e4e; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Courier New',monospace;
           display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .card { border:1px solid var(--border); padding:40px 48px; width:320px; }
    .title { font-size:0.72rem; letter-spacing:0.22em; color:var(--muted); text-transform:uppercase; margin-bottom:28px; }
    input[type="password"] {
      width:100%; background:transparent; border:none; border-bottom:1px solid var(--border);
      color:var(--text); padding:8px 2px; font-size:0.9rem; font-family:inherit; outline:none; margin-bottom:20px;
    }
    input[type="password"]:focus { border-bottom-color:var(--cyan); }
    button {
      width:100%; background:transparent; border:1px solid var(--cyan); color:var(--cyan);
      padding:8px; cursor:pointer; font-size:0.82rem; letter-spacing:0.12em; font-family:inherit;
    }
    button:hover { background:rgba(47,211,224,.08); }
    .error { color:var(--red); font-size:0.78rem; margin-top:14px; }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">Lawren103 Admin</p>
    <form method="POST">
      <input type="password" name="password" placeholder="password" autofocus>
      <button type="submit">Enter</button>
    </form>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </div>
</body>
</html>
